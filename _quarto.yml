project:
  type: website
  output-dir: docs
  resources:
    - img/
    - css/
    - audio/

website:
  title: "Deutsch for English-speakers"
  page-footer: >
      This lesson has been developed by Will Gammerdinger. <br>
      Unless otherwise noted, the original teaching materials in this repository (text, exercises, and code) are distributed under the  [Creative Commons Attribution–ShareAlike 4.0 International License](https://creativecommons.org/licenses/by-sa/4.0/deed.en).
      
      Pronunciation audio files are sourced from [Wiktionary](https://en.wiktionary.org/). Those files retain their original licenses (for example, various Creative Commons licenses or public-domain dedications) as specified on their Wiktionary file pages. If you wish to reuse those pronunciation files, please check the license information for each file on Wiktionary and follow the corresponding terms of use and attribution. <br>
  
  navbar:
    left:
      - text: "Table of Contents"
        href: lessons/TOC.qmd
    right:
      - text: "GitHub"
        href: https://github.com/Gammerdinger/Deutsch
  
  
  sidebar:
    title: "Lessons"      # Optional title above the sidebar
    style: "docked"       # Sidebar is docked to the left
    collapse-level: 1     # At what header level to start collapsing
    # contents: auto      # Creates automatic TOC from page headers (no sections)
    contents:
      - section: "Basic Syntax"
        contents:
        - lessons/01_Nominative_pronouns.qmd
        - lessons/02_Present_verb_conjugation_regular.qmd
        - lessons/03_Present_verb_conjugation_exceptions.qmd


format:
  html:
    theme: simplex
    css: css/styles.css
    fig-align: "center"
    toc: true
    number-sections: false
    code-block-bg: true
    code-copy: true      # enables copy button (default in most themes)
    code-tools: true     # enables the copy button!
    code-line-wrap: wrap
    prompt: true
    include-in-header: audio/audio-helper.html

# Global Execution Defaults
execute:
  echo: true               # show code
  eval: true               # run code
  warning: false           # show warnings
  error: false             # show errors
  message: false           # show messages
  prompt: true
