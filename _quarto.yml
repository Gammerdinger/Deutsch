project:
  type: website
  output-dir: docs
  resources:
    - img/
    - css/
    - audio/

website:
  title: "Deutsch for English-speakers"
  page-footer: >
      These lessons have been developed by Will Gammerdinger.<br><br>          Unless otherwise noted, the original teaching materials in this repository (text, exercises, and code) are distributed under the <a href="https://creativecommons.org/licenses/by-sa/4.0/deed.en"> Creative Commons Attribution–ShareAlike 4.0 International License</a>.<br><br>
      Pronunciation audio files are sourced from <a href="https://en.wiktionary.org/"> Wiktionary</a> and retain their original licenses (for example, various Creative Commons licenses or public‑domain dedications) as specified on their Wiktionary file pages. Detailed per‑file information is available on the <a href="/audio/audio_credits.html">audio credits page</a>. If you wish to reuse those pronunciation files, please consult that page (and the linked Wiktionary file pages where needed) and follow the corresponding terms of use and attribution.<br>
  
  navbar:
    left:
      - text: "Table of Contents"
        href: lessons/TOC.qmd
    right:
      - text: "GitHub"
        href: https://github.com/Gammerdinger/Deutsch
  
  
  sidebar:
    title: "Lessons"      # Optional title above the sidebar
    style: "docked"       # Sidebar is docked to the left
    collapse-level: 1     # At what header level to start collapsing
    # contents: auto      # Creates automatic TOC from page headers (no sections)
    contents:
      - section: "Basic Syntax"
        contents:
        - lessons/01_Nominative_pronouns.qmd
        - lessons/02_Present_verb_conjugation_regular.qmd
        - lessons/03_Present_verb_conjugation_exceptions.qmd


format:
  html:
    theme: simplex
    css: css/styles.css
    fig-align: "center"
    toc: true
    number-sections: false
    code-block-bg: true
    code-copy: true      # enables copy button (default in most themes)
    code-tools: true     # enables the copy button!
    code-line-wrap: wrap
    prompt: true
    include-in-header: audio/audio-helper.html

# Global Execution Defaults
execute:
  echo: true               # show code
  eval: true               # run code
  warning: false           # show warnings
  error: false             # show errors
  message: false           # show messages
  prompt: true
