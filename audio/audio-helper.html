<audio id="global-audio-player"></audio>
<script>
document.addEventListener("DOMContentLoaded", function () {
  console.log("audio-helper: DOMContentLoaded");
  const player = document.getElementById("global-audio-player");
  if (!player) {
    console.error("audio-helper: no #global-audio-player found");
    return;
  }

  document.querySelectorAll(".pron").forEach(function (el) {
    console.log("audio-helper: found .pron", el);
    el.style.cursor = "pointer";
    el.setAttribute("title", "Play pronunciation");

    el.addEventListener("click", function (e) {
      e.preventDefault();

      const listAttr = el.getAttribute("data-src-list");
      const single = el.getAttribute("data-src");

      let sources = [];
      if (listAttr) {
        sources = listAttr.split(",").map(s => s.trim()).filter(Boolean);
      } else if (single) {
        sources = [single];
      }

      console.log("audio-helper: sources to play", sources);
      if (sources.length === 0) return;

      let idx = 0;

      // Clear any old sequence handler
      if (player._sequenceHandler) {
        player.removeEventListener("ended", player._sequenceHandler);
        player._sequenceHandler = null;
      }

      const playNext = function () {
        if (idx >= sources.length) {
          console.log("audio-helper: sequence finished");
          player.removeEventListener("ended", playNext);
          player._sequenceHandler = null;
          return;
        }
        const src = sources[idx++];
        console.log("audio-helper: playing", src);
        player.src = src;
        player.load();  // ensure the new source is loaded
        player.play().catch(err => console.error("audio-helper: play error", err));
      };

      // Store and attach the handler *before* we start playing
      player._sequenceHandler = playNext;
      player.addEventListener("ended", playNext);

      // Start the sequence (first file)
      playNext();
    });
  });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  console.log("tts-helper: DOMContentLoaded");

  function speakGerman(text) {
    if (!("speechSynthesis" in window)) {
      console.warn("tts-helper: speechSynthesis not supported in this browser");
      return;
    }

    // Stop any ongoing speech
    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "de-DE";  // German voice
    utter.rate = 1.0;
    utter.pitch = 1.0;

    window.speechSynthesis.speak(utter);
  }

  // Elements that trigger TTS: <span class="tts-de" data-text="eins">🔊</span>
  document.querySelectorAll(".tts-de").forEach(function (el) {
    console.log("tts-helper: found .tts-de", el);
    el.style.cursor = "pointer";
    if (!el.getAttribute("title")) {
      el.setAttribute("title", "Play text-to-speech");
    }

    el.addEventListener("click", function (e) {
      e.preventDefault();
      const text = el.getAttribute("data-text");
      if (!text) {
        console.warn("tts-helper: .tts-de element has no data-text", el);
        return;
      }
      speakGerman(text);
    });
  });
});
</script>
